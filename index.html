    <!-- ── Structured Data: FAQPage — pertanyaan umum tentang pasut Kepulauan Seribu ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Bagaimana cara cek prediksi pasang surut Kepulauan Seribu?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buka halaman WebGIS Searibu, klik titik mana saja pada peta di area Kepulauan Seribu, lalu panel informasi kelautan akan terbuka menampilkan grafik prediksi pasut per jam menggunakan model TPXO10-atlas-v2."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah data pasut Kepulauan Seribu akurat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Searibu menggunakan model TPXO10-atlas-v2 dengan 15 konstituen harmonik, yang merupakan model pasut astronomis global terkini. Data observasi real-time juga tersedia dari stasiun telemetri Luwes yang terletak di Kepulauan Seribu."
          }
        },
        {
          "@type": "Question",
          "name": "Aktivitas bahari apa saja yang bisa dicek keamanannya di Searibu?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Searibu menyediakan penilaian keamanan untuk 11 aktivitas: snorkeling, scuba diving, freediving, jet ski, SUP/kayak, wisata pulau (island hopping), memancing, konservasi penyu, camping pantai, foto bawah air, dan wisata umum. Setiap aktivitas dinilai berdasarkan kecepatan angin, tinggi gelombang, dan kecepatan arus laut."
          }
        },
        {
          "@type": "Question",
          "name": "Berapa jarak Kepulauan Seribu dari Jakarta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kepulauan Seribu berjarak sekitar 45 km dari Jakarta. Akses termudah melalui Pelabuhan Marina Ancol atau Muara Angke menggunakan kapal cepat atau kapal tradisional."
          }
        }
      ]
    }
